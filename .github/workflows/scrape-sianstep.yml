name: Scrape Sianstep Football API

on:
  workflow_dispatch:
  schedule:
    # 11:30 และ 16:00 เวลาไทย (UTC+7) => 04:30 และ 09:00 UTC
    - cron: "30 4,9 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape and generate JSON
        run: npm run scrape

      - name: Commit updated API data
        run: |
          if [[ -n "$(git status --porcelain data/latest.json docs/api/latest.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/latest.json docs/api/latest.json
            git commit -m "chore: update football API data"
            git push
          else
            echo "No changes to commit."
          fi
